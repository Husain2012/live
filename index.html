<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق بث شاشة الهاتف المبسط</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #1e1e1e; 
            color: #fff; 
            margin: 0;
            padding: 20px;
        }
        h1 { color: #00bcd4; }
        .container { max-width: 800px; margin: 0 auto; }
        video { 
            width: 100%; 
            max-width: 700px; 
            border: 2px solid #00bcd4; 
            border-radius: 8px;
            margin-top: 20px; 
            background: #000; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        .btn-container { margin: 20px 0; }
        button { 
            padding: 12px 25px; 
            font-size: 16px; 
            font-weight: bold;
            border: none; 
            color: white; 
            cursor: pointer; 
            border-radius: 5px; 
            margin: 5px;
            transition: 0.3s ease;
        }
        #startBtn { background: #00bcd4; }
        #startBtn:hover { background: #0097a7; }
        #fullscreenBtn { background: #4caf50; }
        #fullscreenBtn:hover { background: #388e3c; }
        button:disabled { background: #555 !important; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1>تطبيق بث الشاشة المبسط</h1>
        
        <div class="btn-container">
            <button id="startBtn">ابدأ بث شاشة الهاتف 📱</button>
            <button id="fullscreenBtn">تكبير الشاشة 📺</button>
        </div>
        
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script>
        // الاتصال التلقائي بالـ WebSocket الخاص بالسيرفر
        const ws = new WebSocket(`ws://${window.location.host}`);
        const startBtn = document.getElementById('startBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const remoteVideo = document.getElementById('remoteVideo');
        
        let mediaRecorder;

        // ----------------------------------------
        // أولاً: كود إرسال البث (يُضغط من الهاتف)
        // ----------------------------------------
        startBtn.addEventListener('click', async () => {
            try {
                // طلب صلاحية تصوير الشاشة من النظام
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 1280, height: 720, frameRate: 20 }
                });

                // تجهيز مسجل الفيديو بصيغة خفيفة ومناسبة للبث المباشر
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp8' });
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                        ws.send(event.data); // إرسال قطع الفيديو الصغيرة مباشرة للسيرفر
                    }
                };

                // إرسال البيانات كل 100 مللي ثانية لمنع التقطيع
                mediaRecorder.start(100); 
                startBtn.innerText = "جاري البث الآن...";
                startBtn.disabled = true;

            } catch (err) {
                console.error("خطأ:", err);
                alert("تنبيه: متصفحات الهواتف قد تتطلب اتصال HTTPS أو دعم ميزة getDisplayMedia لبث الشاشة بالكامل.");
            }
        });

        // ----------------------------------------
        // ثانياً: كود استقبال البث وعرضه (على الكمبيوتر)
        // ----------------------------------------
        let sourceBuffer;
        const mediaSource = new MediaSource();
        remoteVideo.src = URL.createObjectURL(mediaSource);

        mediaSource.addEventListener('sourceopen', () => {
            sourceBuffer = mediaSource.addSourceBuffer('video/webm; codecs=vp8');
        });

        ws.onmessage = async (event) => {
            // استقبال البيانات وتحويلها لتشغيلها داخل مشغل الفيديو
            const arrayBuffer = await event.data.arrayBuffer();
            if (sourceBuffer && !sourceBuffer.updating) {
                sourceBuffer.appendBuffer(arrayBuffer);
            }
        };

        // ----------------------------------------
        // ثالثاً: كود تكبير الشاشة (Fullscreen)
        // ----------------------------------------
        fullscreenBtn.addEventListener('click', () => {
            if (remoteVideo.requestFullscreen) {
                remoteVideo.requestFullscreen();
            } else if (remoteVideo.mozRequestFullScreen) { 
                remoteVideo.mozRequestFullScreen();
            } else if (remoteVideo.webkitRequestFullscreen) { 
                remoteVideo.webkitRequestFullscreen();
            } else if (remoteVideo.msRequestFullscreen) { 
                remoteVideo.msRequestFullscreen();
            }
        });
    </script>
</body>
</html>
